spring.application.name=inovatu

# --- BANCO DE DADOS ---
spring.datasource.url=jdbc:mysql://db:3306/inovatu_db?useSSL=false&serverTimezone=UTC&createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

# --- JPA / HIBERNATE ---
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.hibernate.ddl-auto=update

# --- LIMITES DE UPLOAD E REQUISIÇÃO ---
# Aumenta o limite para envio de arquivos/imagens (se houver)
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Remove o limite de tamanho para requisições POST no Tomcat
server.tomcat.max-http-form-post-size=-1
server.tomcat.max-swallow-size=-1

# --- LOGS ---
logging.level.br.com.inovatu=INFO
logging.file.name=/var/log/inovatu/spring.log

# --- SEGURANÇA & INTEGRAÇÃO ---
api.security.token.secret=${API_SECURITY_TOKEN_SECRET}
google.recaptcha.secret-key=${GOOGLE_RECAPTCHA_SECRET_KEY}
cors.allowed-origins=${CORS_ALLOWED_ORIGINS}

# --- EMAIL (MAILTRAP) ---
spring.mail.host=sandbox.smtp.mailtrap.io
spring.mail.port=2525
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# --- INSTAGRAM ---
instagram.access.token=${INSTAGRAM_ACCESS_TOKEN}
instagram.user.id=${INSTAGRAM_USER_ID}